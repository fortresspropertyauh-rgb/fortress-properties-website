backend:
  name: github
  repo: fortresspropertyauh-rgb/fortress-properties-website
  branch: main
  base_url: https://api.decapcms.org

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "settings"
    label: "⚙️ Site Settings"
    files:
      - name: "general"
        label: "Company Info & Contact"
        file: "_data/general.json"
        fields:
          - {label: "Logo Image", name: "logo", widget: "image"}
          - {label: "Company Name", name: "company_name", widget: "string"}
          - {label: "Tagline", name: "tagline", widget: "string"}
          - {label: "Hero Background Image", name: "hero_bg", widget: "image", required: false}
          - {label: "Primary Phone", name: "phone1", widget: "string"}
          - {label: "Phone 2", name: "phone2", widget: "string"}
          - {label: "Phone 3", name: "phone3", widget: "string"}
          - {label: "Phone 4", name: "phone4", widget: "string"}
          - {label: "WhatsApp (no + sign)", name: "whatsapp", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Address Line 1", name: "address1", widget: "string"}
          - {label: "Address Line 2", name: "address2", widget: "string"}
          - {label: "Formspree Form ID", name: "formspree_id", widget: "string"}
          - {label: "Instagram URL", name: "instagram", widget: "string", required: false}
          - {label: "Facebook URL", name: "facebook", widget: "string", required: false}
          - {label: "LinkedIn URL", name: "linkedin", widget: "string", required: false}

  - name: "properties"
    label: "🏠 Property Listings"
    folder: "_data/properties"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    fields:
      - {label: "Property Title", name: "title", widget: "string"}
      - {label: "Status", name: "status", widget: "select", options: ["For Sale", "For Rent", "Off-Plan", "Sold", "Rented"]}
      - {label: "Type", name: "type", widget: "select", options: ["apartment", "villa", "commercial", "offplan", "townhouse", "penthouse"]}
      - {label: "Price", name: "price", widget: "string"}
      - {label: "Location", name: "location", widget: "string"}
      - {label: "Bedrooms", name: "beds", widget: "string"}
      - {label: "Bathrooms", name: "baths", widget: "string"}
      - {label: "Size", name: "size", widget: "string"}
      - {label: "Photo", name: "photo", widget: "image", required: false}
      - {label: "Description", name: "description", widget: "text", required: false}
      - {label: "Featured on Homepage", name: "featured", widget: "boolean", default: true}
      - {label: "WhatsApp Message", name: "wa_message", widget: "string"}

  - name: "team"
    label: "👥 Team Members"
    folder: "_data/team"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    fields:
      - {label: "Full Name", name: "name", widget: "string"}
      - {label: "Role", name: "role", widget: "string"}
      - {label: "Photo", name: "photo", widget: "image", required: false}
      - {label: "WhatsApp Number", name: "whatsapp", widget: "string"}
      - {label: "Display Phone", name: "phone_display", widget: "string"}
      - {label: "Languages", name: "languages", widget: "string"}
      - {label: "Bio", name: "bio", widget: "text", required: false}
      - {label: "Order", name: "order", widget: "number", default: 1}

  - name: "testimonials"
    label: "⭐ Testimonials"
    folder: "_data/testimonials"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    fields:
      - {label: "Client Name", name: "name", widget: "string"}
      - {label: "Review Text", name: "text", widget: "text"}
      - {label: "Stars", name: "stars", widget: "select", options: ["5","4","3"], default: "5"}
      - {label: "Source", name: "source", widget: "string"}

  - name: "developers"
    label: "🏗️ Developer Partners"
    folder: "_data/developers"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    fields:
      - {label: "Developer Name", name: "name", widget: "string"}
      - {label: "Logo", name: "logo", widget: "image", required: false}
      - {label: "Location", name: "location", widget: "string"}
      - {label: "Icon Emoji", name: "icon", widget: "string", default: "🏗️"}
      - {label: "Order", name: "order", widget: "number", default: 1}
