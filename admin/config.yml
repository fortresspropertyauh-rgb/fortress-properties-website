backend:
  name: github
  repo: fortresspropertyauh-rgb/fortress-properties-website
  branch: main

media_folder: uploads
public_folder: /uploads

collections:
  - name: properties
    label: Properties
    folder: _data/properties
    create: true
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Status, name: status, widget: string}
      - {label: Type, name: type, widget: string}
      - {label: Price, name: price, widget: string}
      - {label: Location, name: location, widget: string}
      - {label: Beds, name: beds, widget: string}
      - {label: Baths, name: baths, widget: string}
      - {label: Size, name: size, widget: string}
      - {label: Photo, name: photo, widget: image, required: false}
      - {label: Featured, name: featured, widget: boolean, default: true}
      - {label: WhatsApp Message, name: wa_message, widget: string}

  - name: team
    label: Team
    folder: _data/team
    create: true
    fields:
      - {label: Name, name: name, widget: string}
      - {label: Role, name: role, widget: string}
      - {label: Photo, name: photo, widget: image, required: false}
      - {label: WhatsApp, name: whatsapp, widget: string}
      - {label: Phone Display, name: phone_display, widget: string}
      - {label: Languages, name: languages, widget: string}

  - name: testimonials
    label: Testimonials
    folder: _data/testimonials
    create: true
    fields:
      - {label: Name, name: name, widget: string}
      - {label: Review, name: text, widget: text}
      - {label: Stars, name: stars, widget: string}
      - {label: Source, name: source, widget: string}

  - name: developers
    label: Developers
    folder: _data/developers
    create: true
    fields:
      - {label: Name, name: name, widget: string}
      - {label: Logo, name: logo, widget: image, required: false}
      - {label: Location, name: location, widget: string}
      - {label: Icon, name: icon, widget: string}
      - {label: Order, name: order, widget: number}
